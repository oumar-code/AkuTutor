components:
  schemas:
    AskRequest:
      properties:
        question:
          description: Learner's question
          minLength: 1
          title: Question
          type: string
      required:
      - question
      title: AskRequest
      type: object
    FeedbackCreate:
      properties:
        comment:
          anyOf:
          - maxLength: 1000
            type: string
          - type: 'null'
          title: Comment
        learner_id:
          minLength: 1
          title: Learner Id
          type: string
        rating:
          description: Rating from 1 (poor) to 5 (excellent)
          maximum: 5.0
          minimum: 1.0
          title: Rating
          type: integer
        session_id:
          description: Session being reviewed
          format: uuid
          title: Session Id
          type: string
      required:
      - session_id
      - learner_id
      - rating
      title: FeedbackCreate
      type: object
    FeedbackRead:
      properties:
        comment:
          anyOf:
          - type: string
          - type: 'null'
          title: Comment
        created_at:
          format: date-time
          title: Created At
          type: string
        id:
          format: uuid
          title: Id
          type: string
        learner_id:
          title: Learner Id
          type: string
        rating:
          title: Rating
          type: integer
        session_id:
          format: uuid
          title: Session Id
          type: string
      required:
      - session_id
      - learner_id
      - rating
      - comment
      title: FeedbackRead
      type: object
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          title: Detail
          type: array
      title: HTTPValidationError
      type: object
    HintRequest:
      properties:
        question:
          description: Question for which a hint is requested
          minLength: 1
          title: Question
          type: string
      required:
      - question
      title: HintRequest
      type: object
    Message:
      properties:
        content:
          title: Content
          type: string
        role:
          $ref: '#/components/schemas/MessageRole'
        timestamp:
          format: date-time
          title: Timestamp
          type: string
      required:
      - role
      - content
      title: Message
      type: object
    MessageRole:
      enum:
      - learner
      - tutor
      - system
      title: MessageRole
      type: string
    SessionCreate:
      properties:
        grade_level:
          examples:
          - Grade 7
          - JSS2
          - Year 9
          minLength: 1
          title: Grade Level
          type: string
        learner_id:
          description: Unique identifier for the learner
          minLength: 1
          title: Learner Id
          type: string
        subject:
          examples:
          - Mathematics
          - Biology
          minLength: 1
          title: Subject
          type: string
      required:
      - learner_id
      - subject
      - grade_level
      title: SessionCreate
      type: object
    SessionRead:
      properties:
        created_at:
          format: date-time
          title: Created At
          type: string
        grade_level:
          title: Grade Level
          type: string
        id:
          format: uuid
          title: Id
          type: string
        learner_id:
          title: Learner Id
          type: string
        messages:
          items:
            $ref: '#/components/schemas/Message'
          title: Messages
          type: array
        subject:
          title: Subject
          type: string
      required:
      - id
      - learner_id
      - subject
      - grade_level
      - created_at
      title: SessionRead
      type: object
    SessionSummary:
      description: Lightweight session representation returned on creation.
      properties:
        created_at:
          format: date-time
          title: Created At
          type: string
        grade_level:
          title: Grade Level
          type: string
        id:
          format: uuid
          title: Id
          type: string
        learner_id:
          title: Learner Id
          type: string
        subject:
          title: Subject
          type: string
      required:
      - id
      - learner_id
      - subject
      - grade_level
      - created_at
      title: SessionSummary
      type: object
    TutorResponse:
      description: Single turn response returned to the learner.
      properties:
        content:
          title: Content
          type: string
        role:
          $ref: '#/components/schemas/MessageRole'
          default: tutor
        session_id:
          format: uuid
          title: Session Id
          type: string
        timestamp:
          format: date-time
          title: Timestamp
          type: string
      required:
      - session_id
      - content
      title: TutorResponse
      type: object
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          title: Location
          type: array
        msg:
          title: Message
          type: string
        type:
          title: Error Type
          type: string
      required:
      - loc
      - msg
      - type
      title: ValidationError
      type: object
info:
  description: Curriculum-aware AI tutoring service. Delegates all text generation
    to AkuAI.
  title: AkuTutor
  version: 0.1.0
openapi: 3.1.0
paths:
  /api/v1/feedback:
    post:
      description: "Record learner feedback (1\u20135 rating + optional comment) for\
        \ a session.\n\nFeedback is stored and can be used to evaluate tutor quality\
        \ and inform\ncurriculum improvements."
      operationId: submit_feedback_api_v1_feedback_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeedbackCreate'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedbackRead'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Submit feedback for a tutoring session
      tags:
      - feedback
  /api/v1/sessions:
    post:
      description: 'Create a new tutoring session for a learner.


        The caller supplies `subject`, `grade_level`, and `learner_id`.

        Returns a `SessionSummary` containing the new session `id` to use in

        subsequent requests.'
      operationId: create_session_api_v1_sessions_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionCreate'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionSummary'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Start a new tutoring session
      tags:
      - sessions
  /api/v1/sessions/{session_id}:
    get:
      description: Return the full message history for a session.
      operationId: get_session_api_v1_sessions__session_id__get
      parameters:
      - in: path
        name: session_id
        required: true
        schema:
          format: uuid
          title: Session Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionRead'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Retrieve session history
      tags:
      - sessions
  /api/v1/sessions/{session_id}/ask:
    post:
      description: 'Send a learner question to AkuAI and receive a curriculum-aware
        answer.


        The prompt is enriched with `subject` and `grade_level` context from the

        session before being forwarded to AkuAI `/api/v1/text/generate`.'
      operationId: ask_api_v1_sessions__session_id__ask_post
      parameters:
      - in: path
        name: session_id
        required: true
        schema:
          format: uuid
          title: Session Id
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AskRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TutorResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Submit a question to the tutor
      tags:
      - sessions
  /api/v1/sessions/{session_id}/hint:
    post:
      description: 'Request a guiding hint (not the full answer) from AkuAI.


        The prompt instructs AkuAI to scaffold the learner towards the solution

        without revealing it directly.'
      operationId: hint_api_v1_sessions__session_id__hint_post
      parameters:
      - in: path
        name: session_id
        required: true
        schema:
          format: uuid
          title: Session Id
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HintRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TutorResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Request a hint for a question
      tags:
      - sessions
  /health:
    get:
      operationId: health_health_get
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                title: Response Health Health Get
                type: object
          description: Successful Response
      summary: Health
      tags:
      - ops
